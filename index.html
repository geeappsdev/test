<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Gee Support AI</title>

<script src="https://cdn.tailwindcss.com"></script>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">

<style>

body{
background:#f6f9fc;
font-family:Inter,system-ui,sans-serif;
}

.markdown-body{
font-size:14px;
line-height:1.6;
}

.markdown-body p{
margin-bottom:12px;
}

</style>

<!-- React -->
<script src="https://unpkg.com/react@18/umd/react.development.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>

<!-- Babel (so JSX works) -->
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

<!-- Gemini SDK -->
<script type="module">
import {GoogleGenAI} from "https://esm.sh/@google/genai@1";
window.GoogleGenAI = GoogleGenAI;
</script>

</head>

<body>

<div id="root"></div>

<script type="text/babel">

const {useState,useEffect,useRef} = React;

const FORMATS=[
{id:"EO",name:"Email Outline"},
{id:"CL",name:"Chat / RAC Notes"},
{id:"INV",name:"Internal Notes"},
{id:"QS",name:"Quick Summary"},
{id:"CF",name:"Consult Form"}
];

const UNIVERSAL_RULES=`

You are a Senior Stripe Support Assistant.

Rules:

- Professional tone
- Simple English
- Never expose PII
- Always use placeholders [USER_NAME], [USER_EMAIL], [BUSINESS_NAME]

`;

function App(){

const [input,setInput]=useState("");
const [messages,setMessages]=useState([]);
const [loading,setLoading]=useState(false);

const [apiKey,setApiKey]=useState("");
const [name,setName]=useState("");
const [logged,setLogged]=useState(false);

const [format,setFormat]=useState("EO");

const endRef=useRef(null);

useEffect(()=>{

const savedKey=localStorage.getItem("gee_key");
const savedName=localStorage.getItem("gee_name");

if(savedKey && savedName){
setApiKey(savedKey);
setName(savedName);
setLogged(true);
}

},[]);

useEffect(()=>{
endRef.current?.scrollIntoView({behavior:"smooth"});
},[messages]);

function login(e){

e.preventDefault();

if(!name.trim()){
alert("Enter your name");
return;
}

if(!apiKey.trim()){
alert("Enter your API key");
return;
}

localStorage.setItem("gee_key",apiKey);
localStorage.setItem("gee_name",name);

setLogged(true);

}

function logout(){

localStorage.removeItem("gee_key");
localStorage.removeItem("gee_name");

setLogged(false);

}

async function generate(){

if(!input.trim()) return;

setLoading(true);

const ai = new window.GoogleGenAI({apiKey});

const prompt = `
${UNIVERSAL_RULES}

Format: ${format}

Context:
${input}
`;

try{

const res = await ai.models.generateContent({
model:"gemini-1.5-flash",
contents:[{role:"user",parts:[{text:prompt}]}]
});

const text = res?.text || "No response.";

setMessages(prev=>[
...prev,
{role:"user",content:input},
{role:"assistant",content:text}
]);

setInput("");

}catch(e){

setMessages(prev=>[
...prev,
{role:"assistant",content:"Generation failed"}
]);

}

setLoading(false);

}

if(!logged){

return(

<div className="min-h-screen flex items-center justify-center">

<form onSubmit={login} className="bg-white p-8 rounded-xl shadow w-80">

<h1 className="text-xl font-bold mb-6 text-center">
Gee Support AI
</h1>

<input
className="border p-2 w-full mb-4"
placeholder="Your Name"
value={name}
onChange={e=>setName(e.target.value)}
/>

<input
className="border p-2 w-full mb-4"
placeholder="Gemini API Key"
type="password"
value={apiKey}
onChange={e=>setApiKey(e.target.value)}
/>

<button className="bg-indigo-600 text-white w-full py-2 rounded">
Login
</button>

</form>

</div>

)

}

return(

<div className="max-w-4xl mx-auto p-6">

<div className="flex justify-between mb-6">

<h1 className="text-xl font-bold">
Gee Support AI
</h1>

<button onClick={logout} className="text-red-500">
Logout
</button>

</div>

<div className="mb-4">

<select
value={format}
onChange={e=>setFormat(e.target.value)}
className="border p-2"
>

{FORMATS.map(f=>(
<option key={f.id} value={f.id}>
{f.name}
</option>
))}

</select>

</div>

<div className="space-y-4">

{messages.map((m,i)=>(
<div key={i}>
<strong>{m.role==="user"?"You":"AI"}:</strong>
<p>{m.content}</p>
</div>
))}

<div ref={endRef}></div>

</div>

<div className="mt-6 flex gap-2">

<textarea
className="border p-3 flex-1"
rows="3"
value={input}
onChange={e=>setInput(e.target.value)}
/>

<button
onClick={generate}
className="bg-indigo-600 text-white px-6 rounded"
>

{loading ? "Generating..." : "Send"}

</button>

</div>

</div>

)

}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);

</script>

</body>
</html>
