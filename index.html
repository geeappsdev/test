<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Gee Support Assistant</title>

<script src="https://cdn.tailwindcss.com"></script>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">

<style>
body{
font-family:Inter,system-ui;
background:#f6f9fc;
color:#0a2540;
}
.markdown-body p{margin-bottom:1rem}
.markdown-body ul{padding-left:1.25rem;list-style:disc;margin-bottom:1rem}
.markdown-body ol{padding-left:1.25rem;list-style:decimal;margin-bottom:1rem}
.markdown-body strong{font-weight:700}
</style>

<script type="importmap">
{
"imports":{
"react":"https://esm.sh/react@19",
"react-dom/client":"https://esm.sh/react-dom@19/client",
"react-markdown":"https://esm.sh/react-markdown@10",
"remark-gfm":"https://esm.sh/remark-gfm@4",
"@google/genai":"https://esm.sh/@google/genai@1.29.0"
}
}
</script>
</head>

<body>

<div id="root"></div>

<script type="module">

import React,{useState,useEffect,useRef} from "react"
import {createRoot} from "react-dom/client"
import ReactMarkdown from "react-markdown"
import remarkGfm from "remark-gfm"
import {GoogleGenAI} from "@google/genai"

const FORMATS=[
{id:"EO",name:"Email Outline"},
{id:"CL",name:"CHAT/RAC notes"},
{id:"INV",name:"Internal Note"},
{id:"QS",name:"Quick Summary"},
{id:"CF",name:"Consult Form"}
]

const UNIVERSAL_RULES=`
You are a Senior Stripe Support Assistant.

Tone:
Professional, warm, simple English.

Rules:
- Never expose PII
- Always use placeholders [USER_NAME] [USER_EMAIL] [BUSINESS_NAME]
- Email drafts only when EO format selected
`

function App(){

const[input,setInput]=useState("")
const[messages,setMessages]=useState([])
const[loading,setLoading]=useState(false)
const[selectedFormat,setSelectedFormat]=useState("EO")

const[userName,setUserName]=useState("")
const[userApiKey,setUserApiKey]=useState("")
const[loggedIn,setLoggedIn]=useState(false)
const[error,setError]=useState("")

const messagesEndRef=useRef(null)

useEffect(()=>{
const n=localStorage.getItem("gee_name")
const k=localStorage.getItem("gee_key")
if(n&&k){
setUserName(n)
setUserApiKey(k)
setLoggedIn(true)
}
},[])

function handleLogin(e){

e.preventDefault()

if(!userName.trim()){
setError("Enter your name")
return
}

if(!userApiKey.startsWith("AIza")){
setError("Invalid Gemini API key")
return
}

localStorage.setItem("gee_name",userName)
localStorage.setItem("gee_key",userApiKey)

setLoggedIn(true)
setError("")
}

function logout(){
localStorage.clear()
setLoggedIn(false)
setMessages([])
}

async function generate(){

if(!input.trim()||loading)return

const userMsg={
role:"user",
content:input,
timestamp:new Date()
}

setMessages(prev=>[...prev,userMsg])

setLoading(true)
setInput("")
setError("")

try{

const ai=new GoogleGenAI({apiKey:userApiKey})

const prompt=`
${UNIVERSAL_RULES}

FORMAT: ${selectedFormat}

CASE CONTEXT:
${input}
`

const response=await ai.models.generateContent({
model:"gemini-2.5-flash",
contents:[
{
role:"user",
parts:[{text:prompt}]
}
],
config:{
temperature:0.4,
topP:0.9,
maxOutputTokens:4096
}
})

const text=response?.text||
response?.candidates?.[0]?.content?.parts?.[0]?.text

if(!text){
throw new Error("No response generated.")
}

const aiMsg={
role:"assistant",
content:text,
timestamp:new Date()
}

setMessages(prev=>[...prev,aiMsg])

}catch(err){

console.error(err)
setError(err.message||"Generation failed")

}finally{
setLoading(false)
}

}

useEffect(()=>{
messagesEndRef.current?.scrollIntoView({behavior:"smooth"})
},[messages])

if(!loggedIn){

return(

<div class="min-h-screen flex items-center justify-center">

<form onSubmit={handleLogin} class="bg-white p-8 rounded-xl shadow w-80 space-y-4">

<h1 class="text-xl font-bold text-center">
Gee Support Assistant
</h1>

<input
class="border p-2 w-full rounded"
placeholder="Your Name"
value={userName}
onChange={e=>setUserName(e.target.value)}
/>

<input
class="border p-2 w-full rounded"
placeholder="Gemini API Key"
type="password"
value={userApiKey}
onChange={e=>setUserApiKey(e.target.value)}
/>

{error && <p class="text-red-500 text-sm">{error}</p>}

<button class="bg-indigo-600 text-white w-full py-2 rounded">
Login
</button>

</form>

</div>

)

}

return(

<div class="flex h-screen">

<div class="w-60 bg-gray-900 text-white p-4">

<h2 class="font-bold mb-4">Formats</h2>

{FORMATS.map(f=>(

<button
key={f.id}
onClick={()=>setSelectedFormat(f.id)}
class={`block w-full text-left px-3 py-2 rounded mb-2 ${
selectedFormat===f.id?"bg-indigo-600":"hover:bg-gray-700"
}`}
>
{f.name}
</button>

))}

<hr class="my-4"/>

<button
onClick={()=>setMessages([])}
class="text-sm text-gray-300 block mb-2"
>
Clear Chat
</button>

<button
onClick={logout}
class="text-sm text-red-400"
>
Logout
</button>

</div>

<div class="flex-1 flex flex-col">

<div class="flex-1 overflow-y-auto p-6 space-y-6">

{messages.map((m,i)=>(
<div key={i}>

<b>{m.role==="user"?"You":"AI"}:</b>

{m.role==="assistant"?(
<div class="markdown-body">
<ReactMarkdown remarkPlugins={[remarkGfm]}>
{m.content}
</ReactMarkdown>
</div>
):(
<p>{m.content}</p>
)}

</div>
))}

{loading && <p>Generating response...</p>}

{error && <p class="text-red-500">{error}</p>}

<div ref={messagesEndRef}></div>

</div>

<div class="border-t p-4 flex gap-2">

<textarea
class="border flex-1 p-3 rounded"
placeholder="Paste case logs here..."
value={input}
onChange={e=>setInput(e.target.value)}
onKeyDown={e=>{
if(e.key==="Enter"&&!e.shiftKey){
e.preventDefault()
generate()
}
}}
/>

<button
onClick={generate}
class="bg-indigo-600 text-white px-6 rounded"
>
Generate
</button>

</div>

</div>

</div>

)

}

createRoot(document.getElementById("root")).render(<App/>)

</script>

</body>
</html>
