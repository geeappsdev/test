<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Gee Support AI</title>

<script src="https://cdn.tailwindcss.com"></script>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">

<style>

body{
font-family:Inter,system-ui,sans-serif;
background:#f6f9fc;
}

.chat{
max-height:60vh;
overflow-y:auto;
}

.sidebar{
width:220px;
}

</style>

</head>

<body>

<!-- LOGIN -->

<div id="login" class="min-h-screen flex items-center justify-center">

<div class="bg-white shadow-xl p-8 rounded-xl w-80 space-y-4">

<h1 class="text-xl font-bold text-center">
Gee Support AI
</h1>

<input id="name" class="border p-2 w-full rounded" placeholder="Agent Name">

<input id="apikey" type="password" class="border p-2 w-full rounded" placeholder="Gemini API Key">

<button id="loginBtn" class="bg-indigo-600 text-white w-full py-2 rounded">
Login
</button>

</div>

</div>


<!-- APP -->

<div id="app" class="hidden flex">

<!-- SIDEBAR -->

<div class="sidebar bg-white shadow h-screen p-4">

<h2 class="font-bold mb-4">Formats</h2>

<select id="format" class="border p-2 w-full rounded">

<option value="EO">Email Outline</option>
<option value="CL">Chat / RAC Notes</option>
<option value="INV">Internal Notes</option>
<option value="QS">Quick Summary</option>
<option value="CF">Consult Form</option>

</select>

<hr class="my-4">

<button id="clear" class="text-sm text-gray-500 mb-2">Clear Chat</button>
<button id="logout" class="text-sm text-red-500">Logout</button>

</div>


<!-- MAIN -->

<div class="flex-1 p-6">

<h1 class="text-xl font-bold mb-4">
Gee Support AI
</h1>

<div id="messages" class="chat space-y-4 mb-6"></div>

<div class="flex gap-2">

<textarea id="input" rows="3" class="border p-3 flex-1 rounded" placeholder="Paste case logs or context..."></textarea>

<button id="send" class="bg-indigo-600 text-white px-6 rounded">
Generate
</button>

</div>

</div>

</div>


<script>

let apiKey=""
let agentName=""

const rules=`

UNIVERSAL GUIDELINES

Role:
Senior Stripe Support Assistant.

Tone:
Professional
Warm
Simple English

Empathy:
Acknowledge user frustration when relevant.

Privacy:
Never expose PII.

Always use placeholders:
[USER_NAME]
[USER_EMAIL]
[BUSINESS_NAME]

Email rule:
Email drafts ONLY when EO format selected.

Links:
Use public Stripe documentation links.

Sign-off:
Best,
[AGENT_NAME]

`;

const formats={

EO:`
EMAIL OUTLINE FORMAT

1 Summary
2 Email Response
3 Steps I took
4 What response should include
5 Already know
6 Need to know
7 What the user must do
8 Links used
9 DSAT Analysis
10 Outcome Summary
11 Case Status
12 Why case open
13 Speculation
14 User dissatisfaction trigger
`,

CL:`
CHAT / RAC NOTES FORMAT

1 Checked related cases
2 Read full thread
3 Issue summary
4 Steps taken
5 Object IDs
6 Outcome
7 Consult team
8 Speculation
9 Why case open
10 Dissatisfaction trigger
11 Docs used
`,

INV:`
INTERNAL NOTE FORMAT

1 Consent recorded
2 Authentication method
3 Account type
4 Account ID
5 Checked related cases
6 Thread reviewed
7 User concerns
8 Topic
9 Summary
10 Steps taken
11 Outcome
12 Why case open
13 Speculation
14 Dissatisfaction trigger
15 Required reply info
`,

QS:`
QUICK SUMMARY FORMAT

1 Issue summary
2 Case link
3 Case ID
4 Account ID
5 Platform ID
6 Connected account ID
7 Speculation
8 Stripe resources
9 Relevant IDs
10 Why case open
11 Dissatisfaction trigger
12 Sentiment
`,

CF:`
CONSULT FORM FORMAT

1 Consult team
2 Ticket link
3 Object IDs
4 User issue summary
5 Investigation
6 Speculation
`

}

function showLogin(){
document.getElementById("login").classList.remove("hidden")
document.getElementById("app").classList.add("hidden")
}

function showApp(){
document.getElementById("login").classList.add("hidden")
document.getElementById("app").classList.remove("hidden")
}

document.getElementById("loginBtn").onclick=()=>{

agentName=document.getElementById("name").value.trim()
apiKey=document.getElementById("apikey").value.trim()

if(!agentName){alert("Enter name");return}
if(!apiKey){alert("Enter API key");return}

localStorage.setItem("gee_name",agentName)
localStorage.setItem("gee_key",apiKey)

showApp()

}

document.getElementById("logout").onclick=()=>{
localStorage.removeItem("gee_name")
localStorage.removeItem("gee_key")
showLogin()
}

document.getElementById("clear").onclick=()=>{
document.getElementById("messages").innerHTML=""
}

function addMessage(role,text){

const box=document.createElement("div")

box.className="bg-white p-4 rounded shadow"

box.innerHTML=`
<strong>${role==="user"?"You":"AI"}:</strong>
<pre class="mt-2 whitespace-pre-wrap">${text}</pre>
<button class="text-xs text-indigo-600 mt-2 copy">Copy</button>
`

box.querySelector(".copy").onclick=()=>{
navigator.clipboard.writeText(text)
}

document.getElementById("messages").appendChild(box)

}

async function generate(){

const input=document.getElementById("input").value.trim()
const format=document.getElementById("format").value

if(!input) return

addMessage("user",input)

document.getElementById("input").value=""

const prompt=`

${rules}

FORMAT RULES

${formats[format]}

CASE CONTEXT

${input}

`;

try{

const res=await fetch(
`https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${apiKey}`,
{
method:"POST",
headers:{"Content-Type":"application/json"},
body:JSON.stringify({
contents:[{parts:[{text:prompt}]}]
})
}
)

const data=await res.json()

if(data.error){
addMessage("assistant","API Error: "+data.error.message)
return
}

let text="No response."

if(data.candidates &&
data.candidates[0] &&
data.candidates[0].content &&
data.candidates[0].content.parts){

text=data.candidates[0].content.parts[0].text

}

addMessage("assistant",text)

}catch(e){

addMessage("assistant","Network error or invalid API key.")

}

}

document.getElementById("send").onclick=generate

const savedName=localStorage.getItem("gee_name")
const savedKey=localStorage.getItem("gee_key")

if(savedName && savedKey){

agentName=savedName
apiKey=savedKey
showApp()

}else{

showLogin()

}

</script>

</body>
</html>
