<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Stripe Support Assistant</title>

<script src="https://cdn.tailwindcss.com"></script>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">

<style>

body{
background:#f6f9fc;
font-family:Inter,system-ui,sans-serif;
}

.markdown-body{
font-size:14px;
line-height:1.6;
color:#425466;
}

.markdown-body p{
margin-bottom:12px;
}

.markdown-body ul{
list-style:disc;
padding-left:18px;
margin-bottom:12px;
}

.markdown-body strong{
font-weight:600;
color:#0a2540;
}

</style>

<script type="importmap">
{
"imports":{
"react":"https://esm.sh/react@18",
"react-dom/client":"https://esm.sh/react-dom@18/client",
"react-markdown":"https://esm.sh/react-markdown@10",
"remark-gfm":"https://esm.sh/remark-gfm@4",
"@google/genai":"https://esm.sh/@google/genai@1"
}
}
</script>

</head>

<body>

<div id="root"></div>

<script type="module">

import React,{useState,useEffect,useRef} from "react";
import {createRoot} from "react-dom/client";
import ReactMarkdown from "react-markdown";
import remarkGfm from "remark-gfm";
import {GoogleGenAI} from "@google/genai";

const FORMATS=[
{id:"EO",name:"Email Outline"},
{id:"CL",name:"Chat / RAC Notes"},
{id:"INV",name:"Internal Note"},
{id:"QS",name:"Quick Summary"},
{id:"CF",name:"Consult Form"}
];

const UNIVERSAL_RULES=`

You are a Senior Stripe Support Assistant.

Guidelines:

- Professional tone
- Simple English
- Never reveal PII
- Use placeholders [USER_NAME], [USER_EMAIL], [BUSINESS_NAME]
- Follow the selected format carefully

`;

function App(){

const [input,setInput]=useState("");
const [messages,setMessages]=useState([]);
const [loading,setLoading]=useState(false);

const [apiKey,setApiKey]=useState("");
const [name,setName]=useState("");
const [logged,setLogged]=useState(false);

const [format,setFormat]=useState("EO");

const endRef=useRef(null);

useEffect(()=>{

const savedKey=localStorage.getItem("gee_key");
const savedName=localStorage.getItem("gee_name");
const savedHistory=localStorage.getItem("gee_history");

if(savedKey && savedName){
setApiKey(savedKey);
setName(savedName);
setLogged(true);
}

if(savedHistory){
setMessages(JSON.parse(savedHistory));
}

},[]);

useEffect(()=>{
localStorage.setItem("gee_history",JSON.stringify(messages));
},[messages]);

useEffect(()=>{
endRef.current?.scrollIntoView({behavior:"smooth"});
},[messages,loading]);

function login(e){

e.preventDefault();

if(!name.trim()){
alert("Enter your name");
return;
}

if(!apiKey.trim()){
alert("Enter your Gemini API key");
return;
}

localStorage.setItem("gee_key",apiKey);
localStorage.setItem("gee_name",name);

setLogged(true);

}

function logout(){

localStorage.removeItem("gee_key");
localStorage.removeItem("gee_name");

setLogged(false);
setMessages([]);

}

function clearChat(){

setMessages([]);
localStorage.removeItem("gee_history");

}

function copy(text){
navigator.clipboard.writeText(text);
}

async function generate(){

if(!input.trim()) return;
if(loading) return;

setLoading(true);

const userMessage={
role:"user",
content:input
};

setMessages(prev=>[...prev,userMessage]);

const ai=new GoogleGenAI({apiKey});

const prompt=`

${UNIVERSAL_RULES}

Selected Format: ${format}

Case Context:

${input}

`;

try{

const response=await ai.models.generateContent({
model:"gemini-1.5-flash",
contents:[
{
role:"user",
parts:[{text:prompt}]
}
]
});

const text=response?.text || response?.candidates?.[0]?.content?.parts?.[0]?.text || "No response generated.";

setMessages(prev=>[
...prev,
{role:"assistant",content:text}
]);

setInput("");

}catch(err){

console.error(err);

setMessages(prev=>[
...prev,
{
role:"assistant",
content:"⚠️ Generation failed. Check API key or quota."
}
]);

}

setLoading(false);

}

if(!logged){

return(

<div class="min-h-screen flex items-center justify-center">

<form onSubmit={login} class="bg-white shadow-xl p-8 rounded-xl w-80 space-y-4">

<h1 class="text-xl font-bold text-center">
Gee Support AI
</h1>

<input
class="border p-2 w-full"
placeholder="Your Name"
value={name}
onChange={e=>setName(e.target.value)}
/>

<input
class="border p-2 w-full"
type="password"
placeholder="Gemini API Key"
value={apiKey}
onChange={e=>setApiKey(e.target.value)}
/>

<button class="bg-indigo-600 text-white w-full py-2 rounded">
Login
</button>

</form>

</div>

)

}

return(

<div class="max-w-4xl mx-auto p-6">

<div class="flex justify-between mb-6">

<h1 class="text-xl font-bold">
Gee Support AI
</h1>

<div class="flex gap-3">

<button onClick={clearChat} class="text-sm text-gray-500">
Clear
</button>

<button onClick={logout} class="text-sm text-red-500">
Logout
</button>

</div>

</div>

<div class="mb-4">

<select
value={format}
onChange={e=>setFormat(e.target.value)}
class="border p-2"
>

{FORMATS.map(f=>(
<option key={f.id} value={f.id}>
{f.name}
</option>
))}

</select>

</div>

<div class="space-y-6">

{messages.map((m,i)=>(

<div key={i}>

{m.role==="assistant" ? (

<div class="bg-white p-4 rounded shadow">

<div class="markdown-body">
<ReactMarkdown remarkPlugins={[remarkGfm]}>
{m.content}
</ReactMarkdown>
</div>

<button
onClick={()=>copy(m.content)}
class="text-xs text-indigo-600 mt-2"
>
Copy
</button>

</div>

):( 

<div class="text-gray-700">
{m.content}
</div>

)}

</div>

))}

{loading && (
<div class="text-gray-400">
Generating...
</div>
)}

<div ref={endRef}></div>

</div>

<div class="mt-6 flex gap-2">

<textarea
class="border p-3 flex-1"
rows="3"
placeholder="Paste case context..."
value={input}
onChange={e=>setInput(e.target.value)}
/>

<button
onClick={generate}
class="bg-indigo-600 text-white px-6 rounded"
>
Send
</button>

</div>

</div>

)

}

const root=createRoot(document.getElementById("root"));

root.render(<App/>);

</script>

</body>
</html>
